name: Prepare release

on:
  push:
    branches: [main]
    paths: ['.changes/unreleased/*.yaml']

permissions:
  contents: write
  pull-requests: write

jobs:
  prepare:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
          token: ${{ secrets.RELEASE_TOKEN }}

      - name: Close stale release PRs
        env:
          GH_TOKEN: ${{ secrets.RELEASE_TOKEN }}
        run: |
          gh pr list --head 'release/' --state open --json number --jq '.[].number' |
            xargs -I {} gh pr close {} --comment 'Superseded by a new release PR.'

      - uses: labd/changie-release-action@ac4d65e736733f1d2c363dd5d99b43a1add5aaef # v0.6.0
        with:
          github-token: ${{ secrets.RELEASE_TOKEN }}
