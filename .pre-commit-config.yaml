repos:
  - repo: https://github.com/golangci/golangci-lint
    rev: v2.8.0
    hooks:
      - id: golangci-lint

  - repo: local
    hooks:
      - id: prettier
        name: prettier
        entry: npx prettier --write --ignore-unknown
        language: system
        types_or: [markdown, json, yaml]

      - id: beads
        name: beads sync
        entry: bash scripts/beads-sync.sh
        language: system
        pass_filenames: false
        always_run: true
